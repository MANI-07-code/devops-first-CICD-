<!DOCTYPE html>
<html>
<head>
    <title>Student Result System</title>
</head>
<body>

    <h1>📘 Student Result System</h1>

    <!--  Message from Flask -->
    {% if msg %}
        <p style="color:green;"><b>{{ msg }}</b></p>
    {% endif %}

    <hr>

    <!--  TEACHER -->
    <h2> Teacher Section</h2>
    <p>Login to add/update student marks</p>
    <a href="/teacher">
        <button>Teacher Login</button>
    </a>

    <hr>

    <!-- 🎓 STUDENT -->
    <h2> Student Section</h2>
    <p>Login to view your marks</p>
    <a href="/student">
        <button>Student Login</button>
    </a>

    <hr>

    <!--  QUICK CHECK (NEW FEATURE) -->
    <h2> Quick Result Check</h2>
    <form action="/student" method="post">
        Student ID: <input type="number" name="sid" required><br><br>
        DOB: <input type="text" name="dob" placeholder="dd-mm-yyyy" required><br><br>
        <button type="submit">View Result</button>
    </form>

    <hr>

    <!--  HEALTH CHECK -->
    <h2> System Status</h2>
    <a href="/health">
        <button>Check Health</button>
    </a>

</body>
</html>
