
name: ec2-pipeline
on: workflow_dispatch

jobs:
  build-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: get pem file
        run: |
          echo "${{ SECRETS }}" > key.pem
          chmod 400 key.pem
          
      - name: copy app.py
        run: scp -o StrictHostKeyChecking=no -i MANI-key.pem app.py ec2-user@13.201.50.215:/home/ec2-user/

      - name: copy requirements.txt
        run: scp -o StrictHostKeyChecking=no -i MANI-key.pem requirements.txt ec2-user@13.201.50.215:/home/ec2-user/

      - name: run application
        run: |
          ssh -o StrictHostKeyChecking=no -i MANI-key.pem ec2-user@13.201.50.215"
          cd /home/ec2-user &&
          python3 -m venv virtualenv &&
          source virtualenv/bin/activate &&
          pip3 install -r requirements.txt &&
          python3 app.py
          "
